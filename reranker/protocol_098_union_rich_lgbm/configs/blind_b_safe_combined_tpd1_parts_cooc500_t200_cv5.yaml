description: >
  [Blind-B-safe + combined TPD1 parts cooc500 cv5] current TPD1 combined
  5-fold から cooc_track source cap だけを 500 に広げた candidate artifact を使う。

candidate_artifacts:
  public_labeled: artifacts/runs/retriever/union/blind_b_safe_combined_tpd1_parts_cooc500_cv5/public_labeled
  blind_b: artifacts/runs/retriever/union/blind_b_safe_combined_tpd1_parts_cooc500_cv5/blind_b

max_candidates: all
top_k: 20
cv_folds: all
cv_artifact_mode: cv5_oof
primary_score_mode: zero
source_features: true
train_positive_only: true
allow_encode_missing: true
blind_target: blind_b

lgbm:
  objective: lambdarank
  n_estimators: 200
  num_leaves: 63
  learning_rate: 0.04
  subsample: 0.85
  colsample_bytree: 0.85
  min_child_samples: 20
  lambdarank_truncation_level: null
  n_jobs: -1
  seed: 20260520

feature_build:
  feature_chunk_examples: 512
  n_bm25_for_dense_flag: null
  drop_cross_source_score_meta: true
  extra_metadata_features: true
  extra_hier_pop_features: true
  extra_tag_chain_features: true
  neutralize_098_features:
    - candidate_rank
    - log_candidate_rank
    - reciprocal_candidate_rank
    - prior_gpa_count
    - prior_moves_toward_count
    - prior_not_move_count
    - prior_null_gpa_count
    - goal_track_tfidf_sim

leak_policy:
  devset_score_tuning: false
  track_emb_test_tracks: false
  popularity_tiebreaker: false
  blind_b_safe: true
  external_data_allowed: true
  external_sources:
    - TalkPlayData-1
  external_duplicate_policy: no_purge_all_tpd1_all_folds
  current_thought_allowed: false
  conversation_goal_allowed: false
  gpa_allowed: false
