description: >
  Union of the retriever sources listed in this config. The union retriever
  reads each source artifact in order and keeps the first occurrence of each
  candidate track.
selection_basis: manual_hypothesis_pre_devset
source_config: basic
usage:
  role: example_union_inference_candidates
  preferred_fit_mode_for_train_fitted_sources: full_train
  local_eval_and_submission_must_match_if_pipeline_selects_this_config: true
  usable_for:
    - devset_local_evaluation
    - blind_a_submission
    - blind_b_submission
  note: >
    This is one possible retriever config. If a pipeline selects this retriever
    config, local devset evaluation and blind submissions must both use the same
    pipeline config; do not evaluate with a narrower or safer retriever and
    submit with this one, or vice versa.
train_row_usage:
  purpose: downstream_model_fit_candidates
  use_same_source_list_as_pipeline_inference: true
  required_artifact_mode_for_labeled_fit_sources: oof2_train
  labeled_fit_exception_artifact_mode_for_strict_date_censored_sources: strict_date_censored_all_rows
  default_artifact_mode_for_fit_free_sources: fit_free_all_rows
  default_artifact_mode_for_inference_targets: full_train
  when_oof_is_missing: do_not_use_in_sample_train_row_source_features
  note: >
    Do not create a separate local-evaluation/submission retriever config for
    train-row fitting. Use the same source list as the pipeline-selected
    retriever config, but resolve train-fitted retrievers to OOF train-row
    artifacts when building candidates/features for fitting rerankers or other
    downstream models. Sources that do not fit on labeled train outcomes, such
    as BM25/TF-IDF over track metadata or pretrained dense encoders, do not need
    fold-specific artifacts; build them once over the full target rows and reuse
    the same scores for reranker fitting, local evaluation, and submission.
    Same-user memory sources are label-derived but can use all rows for
    reranker fitting only when the artifact manifest asserts strict target-date
    censoring and no target-session self-inclusion.
source_policy_defaults:
  requires_labeled_fit: false
  fit_sources:
    - track_metadata
    - target_input_context
    - pretrained_or_official_nonlabel_model
  train_row_policy: safe_in_sample
  fold_split_required_for_reranker_train: false
  preferred_train_row_artifact_mode: fit_free_all_rows
  preferred_inference_artifact_mode: fit_free_all_rows
  reason: >
    Default source policy for retrievers that do not fit on train query->gold,
    train music outcomes, same-user train memory, or other labeled-row
    statistics. BM25/TF-IDF and pretrained dense retrieval fall here and should
    not be split into folds just to train a downstream reranker.
sources:
  - bm25_5field_thought
  - two_tower_lora_thought

  - dense_qwen3_attributes
  - dense_qwen3_lyrics
  - dense_siglip_image
  - dense_clap_audio
  - album_qwen3_history

  - metadata_query_rrf_nohistory
  - attribute_query_rrf
  - lyrics_query_rrf
  - tag_intent_bm25

  - user_emb_track_cf
  - cf_history_centroid
  - user_neighbor
  - train_neighbor

  - cooc_track
  - cooc_artist

  - history_artist
  - history_album
  - last_music_artist
  - last_music_album
  - history_primary_tag
  - history_release_decade

  - current_artist_catalog_source
  - exact_title_artist_source
  - exact_album_artist_source
  - secondary_artist_source

  - personal_exact_repeat
  - personal_artist_expansion
  - personal_album_expansion

  - train_play_count_unique_users
  - popularity_global
  - user_culture_match

  - hyde_bm25_5field
  - hyde_dense_qwen3_metadata
  - llm_track_names
source_metadata:
  two_tower_lora_thought:
    family: supervised_neural_retriever
    requires_labeled_fit: true
    fit_sources:
      - train_query_gold_pairs
      - output/113_two_tower_lora_thought/model.pt
    train_row_policy: inference_only_without_oof
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: inference_only_without_oof
    reason: >
      The 113 Two-Tower model is trained on train query->gold pairs. Its
      in-sample train candidates/scores should not be used to fit a reranker
      unless an OOF/holdout retriever artifact is generated.
  user_emb_track_cf:
    family: collaborative_filtering
    requires_labeled_fit: true
    fit_sources:
      - official_user_embeddings
      - official_track_cf_embeddings
      - train_interaction_signal
    train_row_policy: inference_only_without_oof
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: inference_only_without_oof
    reason: >
      User and track CF embeddings can encode train interactions. For train-row
      reranker fitting, use OOF/holdout CF artifacts or exclude this source.
  cf_history_centroid:
    family: collaborative_filtering
    requires_labeled_fit: true
    fit_sources:
      - official_track_cf_embeddings
      - train_interaction_signal
    train_row_policy: inference_only_without_oof
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: inference_only_without_oof
    reason: >
      Track CF embeddings are fit from train interactions. The source is fine
      for dev/blind inference, but in-sample train-row scores are not an honest
      reranker training signal without OOF/holdout fitting.
  user_neighbor:
    family: train_user_memory
    requires_labeled_fit: true
    fit_sources:
      - train_user_embeddings
      - train_user_music_history
    train_row_policy: inference_only_without_oof
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: inference_only_without_oof
    reason: >
      Similar-user lookup uses train user embeddings and train user histories.
      It needs an OOF/user-held-out variant before its train-row scores are used
      as reranker training features.
  train_neighbor:
    family: train_label_memory
    requires_labeled_fit: true
    fit_sources:
      - train_query_embeddings
      - train_gold_tracks
    train_row_policy: requires_leave_self_out
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: leave_self_out_required
    reason: >
      Query-neighbor retrieval maps train queries to train gold tracks. For
      train-row reranker fitting it must exclude the target train example or use
      OOF folds; otherwise it can memorize the training row.
  cooc_track:
    family: train_statistical
    requires_labeled_fit: true
    fit_sources:
      - train_music_outcomes
    train_row_policy: oof_or_leave_session_out_required
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: oof_or_leave_session_out_required
    reason: >
      Co-occurrence counts are fit from train music outcomes. For train-row
      fitting, build counts without the target session/fold before using source
      rank/score as reranker features.
  cooc_artist:
    family: train_statistical
    requires_labeled_fit: true
    fit_sources:
      - train_music_outcomes
    train_row_policy: oof_or_leave_session_out_required
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: oof_or_leave_session_out_required
    reason: >
      Artist co-occurrence counts are train-label statistics and need the same
      OOF/session-out treatment as track co-occurrence for reranker training.
  train_play_count_unique_users:
    family: train_statistical
    requires_labeled_fit: true
    fit_sources:
      - train_music_outcomes
    train_row_policy: oof_or_leave_session_out_required
    fold_split_required_for_reranker_train: true
    preferred_train_row_artifact_mode: oof2_train
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: oof_or_leave_session_out_required
    reason: >
      Popularity/count features are train-outcome statistics. They can be used
      for dev/blind inference, but honest train-row reranker features should be
      computed out-of-fold or leave-session-out.
  popularity_global:
    family: track_metadata_popularity
    requires_labeled_fit: false
    fit_sources:
      - track_metadata_popularity
    train_row_policy: safe_in_sample
    fold_split_required_for_reranker_train: false
    preferred_train_row_artifact_mode: fit_free_all_rows
    preferred_inference_artifact_mode: fit_free_all_rows
    reason: >
      This source uses the static popularity value in track metadata. It is an
      explicit retriever score, not a tie-breaker, and it does not need fold
      splitting. Train-derived popularity/count retrievers should use
      train_play_count_unique_users and require OOF/session-out treatment.
  personal_exact_repeat:
    family: same_user_train_memory
    requires_labeled_fit: true
    fit_sources:
      - train_same_user_music_history
    train_row_policy: requires_strict_date_censor
    fold_split_required_for_reranker_train: false
    preferred_train_row_artifact_mode: strict_date_censored_all_rows
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: strict_date_censor_required
    reason: >
      This source uses same-user train music history, so it is not fit-free.
      It is acceptable for train-row reranker fitting only if every target row
      uses sessions strictly earlier than the target session_date and excludes
      the target session itself.
  personal_artist_expansion:
    family: same_user_train_memory
    requires_labeled_fit: true
    fit_sources:
      - train_same_user_music_history
      - track_artist_metadata
    train_row_policy: requires_strict_date_censor
    fold_split_required_for_reranker_train: false
    preferred_train_row_artifact_mode: strict_date_censored_all_rows
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: strict_date_censor_required
    reason: >
      This source expands prior same-user train listens to artist catalogs. It
      is label-derived and must remain strictly target-date censored for both
      local evaluation and reranker fitting.
  personal_album_expansion:
    family: same_user_train_memory
    requires_labeled_fit: true
    fit_sources:
      - train_same_user_music_history
      - track_album_metadata
    train_row_policy: requires_strict_date_censor
    fold_split_required_for_reranker_train: false
    preferred_train_row_artifact_mode: strict_date_censored_all_rows
    preferred_inference_artifact_mode: full_train
    reranker_train_candidate_policy: strict_date_censor_required
    reason: >
      This source expands prior same-user train listens to album catalogs. It
      is label-derived and must remain strictly target-date censored for both
      local evaluation and reranker fitting.
union_rule:
  type: ordered_unique
  max_candidates: null
  tie_breaker: source_order_then_source_rank
feature_policy:
  keep_source_present: true
  keep_source_rank: true
  keep_source_scores_when_available: true
  compute_field_specific_bm25_in_reranker: true
  do_not_include:
    - history_artist_album
    - rrf_weighted
    - rrf_meta
    - bm25_artist_name
    - bm25_album_name
    - bm25_tag_list
    - bm25_track_name
    - bm25_artist_album
    - two_tower
    - two_tower_lora
    - two_tower_lora_v2
    - two_tower_hardneg
    - two_tower_lora_hardneg
leak_check:
  uses_track_emb_test_tracks: false
  source_selection_uses_devset_tuning: false
  note: >
    This config is a fixed source list for the union retriever. It should not
    be edited after looking at this config's devset score to tune cutoff,
    source order, or source membership for the same devset.
